# config/assets.yml
# daily:    OHLCV daily bars via Polygon (backfill + incremental)
# intraday: 5-minute bars via yfinance (incremental, market hours only)

daily:
  - SPY    # S&P 500 ETF
  - QQQ    # Nasdaq 100 ETF
  - IWM    # Russell 2000 ETF
  - TLT    # 20+ Year Treasury ETF
  - IEF    # 7-10 Year Treasury ETF
  - SHY    # 1-3 Year Treasury ETF
  - HYG    # High Yield Corporate Bond ETF
  - LQD    # Investment Grade Corporate Bond ETF
  - EMB    # Emerging Market Bonds ETF
  - GLD    # Gold ETF
  - SLV    # Silver ETF
  - USO    # Crude Oil ETF
  - UNG    # Natural Gas ETF
  - CPER   # Copper ETF
  - UUP    # US Dollar Index ETF
  - VIXY   # VIX Short-Term Futures ETF
  - VTV    # Value ETF
  - XLF    # Financials Sector ETF
  - XLE    # Energy Sector ETF
  - XLI    # Industrials Sector ETF
  - XLK    # Technology Sector ETF
  - EFA    # Developed Markets ex-US ETF
  - EEM    # Emerging Markets ETF

intraday:
  - SPY
  - QQQ
  - IWM
  - TLT
  - GLD
  - UUP
  - VIXY

fred_credit:
  - BAMLH0A0HYM2  # HY OAS — ICE BofA HY Index Option-Adjusted Spread
  - BAMLC0A0CM    # IG OAS — ICE BofA US Corporate Index OAS
  - BAMLH0A3HYC   # CCC OAS — ICE BofA CCC & Lower Rated OAS
  - BAMLH0A1HYBB  # BB OAS — ICE BofA BB US HY Index OAS
  - BAMLH0A2HYB   # B OAS  — ICE BofA Single-B US HY Index OAS
