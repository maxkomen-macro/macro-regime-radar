# config/assets.yml
# Market symbols tracked via Polygon.
#
# daily:    symbols to fetch as OHLCV daily bars (backfill + incremental)
# intraday: symbols to fetch as 5-minute bars (incremental / today only)

daily:
  - SPY    # S&P 500 ETF
  - QQQ    # Nasdaq 100 ETF
  - IWM    # Russell 2000 ETF
  - TLT    # 20+ Year Treasury ETF
  - HYG    # High Yield Corporate Bond ETF
  - LQD    # Investment Grade Corporate Bond ETF
  - GLD    # Gold ETF
  - UUP    # US Dollar Index ETF
  - USO    # Crude Oil ETF

intraday:
  - SPY
  - QQQ
