name: Weekly Memo Email

on:
  schedule:
    - cron: "0 13 * * 1"   # Every Monday at 13:00 UTC = 8:00 AM ET (after daily refresh at 11:00 UTC)
  workflow_dispatch:         # Allow manual trigger for testing

permissions:
  contents: write

jobs:
  email-memo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate weekly memo
        run: python src/memo.py

      - name: Copy memo to GitHub Pages location
        run: cp output/weekly_memo.html docs/memo/weekly_memo.html

      - name: Build email body with browser link
        run: |
          cat > output/email_header.html << 'EOF'
          <div style="font-family: Arial, sans-serif; font-size: 16px; padding: 15px; background-color: #f0f4f8; border-radius: 8px; margin-bottom: 20px;">
            📊 <a href="https://maxkomen-macro.github.io/macro-regime-radar/memo/weekly_memo.html" style="color: #1f77b4; text-decoration: none; font-weight: bold;">View this memo in your browser</a>
            &nbsp;|&nbsp;
            📈 <a href="https://macro-regime-radar.streamlit.app/" style="color: #1f77b4; text-decoration: none; font-weight: bold;">Live Dashboard</a>
          </div>
          <hr style="border: 1px solid #ddd; margin-bottom: 20px;">
          EOF
          cat output/email_header.html output/weekly_memo.html > output/email_body.html

      - name: Commit and push updated memo to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/memo/weekly_memo.html
          if git diff --cached --quiet; then
            echo "No memo changes to commit"
          else
            git commit -m "Update weekly memo [skip ci]"
            git stash --include-untracked
            git pull --rebase
            git stash pop || true
            git push
          fi
          if [ ! -f output/email_body.html ]; then
            cat output/email_header.html output/weekly_memo.html > output/email_body.html 2>/dev/null || cp output/weekly_memo.html output/email_body.html
          fi
          ls -la output/email_body.html

      - name: Send memo email
        uses: dawidd6/action-send-mail@v2
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_ADDRESS }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Macro Regime Radar — Weekly Memo"
          to: ${{ secrets.GMAIL_ADDRESS }}
          from: Macro Radar <${{ secrets.GMAIL_ADDRESS }}>
          body: file://output/email_body.html
          content_type: text/html
